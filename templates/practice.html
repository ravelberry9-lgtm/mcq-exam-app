<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Practice – {{ topic.replace('_',' ') }}</title>
<style>
:root {
  --primary: #1a237e;
  --primary-light: #3949ab;
  --accent: #ff6f00;
  --bg: #f0f2ff;
  --card: #ffffff;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --border: #e0e4ef;
  --correct: #2e7d32;
  --correct-bg: #e8f5e9;
  --wrong: #c62828;
  --wrong-bg: #fce4ec;
  --neutral-bg: #f5f6fa;
  --radius: 14px;
  --shadow: 0 2px 12px rgba(26,35,126,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── Top bar ── */
.top-bar {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: #fff;
  padding: 12px 16px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
}
.back-btn {
  background: rgba(255,255,255,0.18);
  border: none;
  color: #fff;
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
  flex-shrink: 0;
}
.bar-title { flex: 1; min-width: 0; }
.bar-title h2 { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-title p  { font-size: 11px; opacity: 0.75; margin-top: 1px; }
.score-chip {
  background: rgba(255,255,255,0.20);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Progress bar ── */
.progress-wrap { background: rgba(255,255,255,0.2); height: 3px; }
.progress-fill { height: 3px; background: #ffcc02; transition: width 0.4s ease; }

/* ── Filter strip ── */
.filter-strip {
  display: flex;
  gap: 8px;
  padding: 10px 14px 6px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-strip::-webkit-scrollbar { display: none; }
.filter-chip {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.15s;
}
.filter-chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }

/* ── Loading ── */
.loading-wrap { text-align: center; padding: 80px 20px; color: var(--text-muted); }
.spinner { width: 38px; height: 38px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Intro card ── */
.intro-card {
  margin: 16px 14px;
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  text-align: center;
}
.intro-icon { font-size: 40px; margin-bottom: 10px; }
.intro-card h3 { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
.intro-card p  { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
.start-btn {
  display: inline-block;
  margin-top: 16px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 12px 36px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(26,35,126,0.25);
}
.start-btn:active { transform: scale(0.97); }

/* ── Question card ── */
.q-card {
  margin: 14px 14px 0;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  display: none;
}
.q-card.visible { display: block; }

.q-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px 0;
}
.q-num {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.diff-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  text-transform: uppercase;
}
.diff-Easy   { background: #e8f5e9; color: #2e7d32; }
.diff-Medium { background: #fff3e0; color: #e65100; }
.diff-Hard   { background: #fce4ec; color: #ad1457; }

.q-text {
  padding: 10px 14px 12px;
  font-size: 15px;
  font-weight: 600;
  line-height: 1.55;
  color: var(--text);
}

/* ── Options ── */
.options-list { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 9px; }

.opt-btn {
  width: 100%;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: var(--neutral-bg);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 11px 13px;
  cursor: pointer;
  text-align: left;
  font-size: 14px;
  color: var(--text);
  transition: all 0.18s;
  line-height: 1.45;
  -webkit-tap-highlight-color: transparent;
}
.opt-btn:active:not(.locked) { transform: scale(0.985); }
.opt-btn:hover:not(.locked) { border-color: var(--primary-light); background: #eef0fb; }

.opt-key {
  width: 26px;
  height: 26px;
  min-width: 26px;
  border-radius: 50%;
  background: var(--border);
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  transition: all 0.18s;
}
.opt-text { flex: 1; padding-top: 3px; }

/* Correct / wrong states */
.opt-btn.correct-ans {
  background: var(--correct-bg);
  border-color: var(--correct);
}
.opt-btn.correct-ans .opt-key { background: var(--correct); color: #fff; }

.opt-btn.wrong-ans {
  background: var(--wrong-bg);
  border-color: var(--wrong);
}
.opt-btn.wrong-ans .opt-key { background: var(--wrong); color: #fff; }

.opt-btn.locked { cursor: default; }

/* ── Feedback panel ── */
.feedback-panel {
  margin: 0 14px;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 13.5px;
  line-height: 1.6;
  display: none;
  animation: fadeUp 0.22s ease;
}
.feedback-panel.show { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.feedback-panel.correct-fb { background: var(--correct-bg); border: 1.5px solid #a5d6a7; color: #1b5e20; }
.feedback-panel.wrong-fb   { background: var(--wrong-bg);   border: 1.5px solid #f48fb1; color: #880e4f; }

.fb-label { font-weight: 800; font-size: 14px; margin-bottom: 5px; }
.fb-explanation { color: var(--text); font-size: 13px; line-height: 1.65; margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(0,0,0,0.08); }

/* ── Next button ── */
.next-wrap { padding: 12px 14px 0; display: none; }
.next-wrap.show { display: block; }
.next-btn {
  width: 100%;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 13px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s;
}
.next-btn:active { background: var(--primary-light); }

/* ── Summary card ── */
.summary-card {
  margin: 14px;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px 20px;
  text-align: center;
  display: none;
}
.summary-card.show { display: block; }
.summary-icon { font-size: 52px; margin-bottom: 12px; }
.summary-title { font-size: 22px; font-weight: 800; color: var(--primary); }
.summary-score { font-size: 40px; font-weight: 900; margin: 10px 0 4px; }
.summary-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
.stat-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 24px; }
.stat-box { text-align: center; }
.stat-box .sv { font-size: 26px; font-weight: 800; }
.stat-box .sl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
.summary-actions { display: flex; gap: 10px; }
.sa-btn {
  flex: 1;
  padding: 13px;
  border-radius: 50px;
  border: none;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
.sa-home { background: var(--neutral-bg); color: var(--primary); border: 2px solid var(--border); }
.sa-retry { background: var(--primary); color: #fff; }

/* ── No questions ── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <button class="back-btn" onclick="history.back()">←</button>
  <div class="bar-title">
    <h2>{{ topic.replace('_',' ') }}</h2>
    <p>{{ folder.replace('_',' ') }} · Practice Mode</p>
  </div>
  <div class="score-chip" id="scoreChip">0 / 0</div>
</div>
<div class="progress-wrap">
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<!-- Filter strip -->
<div class="filter-strip">
  <button class="filter-chip active" onclick="setFilter('all',this)">All</button>
  <button class="filter-chip" onclick="setFilter('Easy',this)">Easy</button>
  <button class="filter-chip" onclick="setFilter('Medium',this)">Medium</button>
  <button class="filter-chip" onclick="setFilter('Hard',this)">Hard</button>
</div>

<!-- Loading -->
<div class="loading-wrap" id="loadingWrap">
  <div class="spinner"></div>
  <div>Loading questions…</div>
</div>

<!-- Intro -->
<div class="intro-card" id="introCard" style="display:none">
  <div class="intro-icon">🎯</div>
  <h3 id="introTitle">Practice Mode</h3>
  <p id="introDesc">Tap an option to instantly see if you're right or wrong, with an explanation.</p>
  <button class="start-btn" onclick="startPractice()">Start Practice</button>
</div>

<!-- Question area -->
<div id="questionArea">
  <!-- Cards injected here -->
</div>

<!-- Feedback panel -->
<div class="feedback-panel" id="feedbackPanel">
  <div class="fb-label" id="fbLabel"></div>
  <div id="fbExplanation" class="fb-explanation"></div>
</div>

<!-- Next button -->
<div class="next-wrap" id="nextWrap">
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
</div>

<!-- Summary -->
<div class="summary-card" id="summaryCard">
  <div class="summary-icon" id="summaryIcon">🏆</div>
  <div class="summary-title">Practice Complete!</div>
  <div class="summary-score" id="summaryScore">0%</div>
  <div class="summary-sub" id="summarySub">0 correct out of 0</div>
  <div class="stat-row">
    <div class="stat-box">
      <div class="sv" style="color:#2e7d32" id="sumCorrect">0</div>
      <div class="sl">Correct</div>
    </div>
    <div class="stat-box">
      <div class="sv" style="color:#c62828" id="sumWrong">0</div>
      <div class="sl">Wrong</div>
    </div>
    <div class="stat-box">
      <div class="sv" style="color:#1a237e" id="sumTotal">0</div>
      <div class="sl">Total</div>
    </div>
  </div>
  <div class="summary-actions">
    <button class="sa-btn sa-home" onclick="window.location.href='/'">🏠 Home</button>
    <button class="sa-btn sa-retry" onclick="restartPractice()">🔄 Retry</button>
  </div>
</div>

<script>
const FOLDER = '{{ folder }}';
const TOPIC  = '{{ topic }}';

let allQuestions   = [];
let filteredQs     = [];
let currentIdx     = 0;
let correct        = 0;
let wrong          = 0;
let answered       = 0;
let filterMode     = 'all';
let started        = false;

// ── Load questions ──────────────────────────────────────────────────────────
async function load() {
  try {
    const r = await fetch(`/api/practice-questions/${FOLDER}/${TOPIC}`);
    const d = await r.json();
    allQuestions = d.questions || [];
    document.getElementById('loadingWrap').style.display = 'none';
    if (!allQuestions.length) {
      document.getElementById('questionArea').innerHTML = '<div class="empty-state">No questions found for this topic.</div>';
      return;
    }
    showIntro();
  } catch(e) {
    document.getElementById('loadingWrap').innerHTML = '<p style="color:red;padding:40px">Failed to load questions.</p>';
  }
}

function showIntro() {
  const q = filteredQs.length || allQuestions.length;
  document.getElementById('introTitle').textContent = TOPIC.replace(/_/g,' ') + ' Practice';
  document.getElementById('introDesc').textContent =
    `${allQuestions.length} questions ready. Tap an option to instantly see right/wrong with explanation.`;
  document.getElementById('introCard').style.display = '';
}

// ── Filters ─────────────────────────────────────────────────────────────────
function setFilter(mode, btn) {
  filterMode = mode;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (started) {
    // Apply filter mid-session: restart with filtered set
    applyFilter();
    restartPractice();
  }
}

function applyFilter() {
  if (filterMode === 'all') {
    filteredQs = [...allQuestions];
  } else {
    filteredQs = allQuestions.filter(q => q.difficulty === filterMode);
  }
  // Shuffle
  for (let i = filteredQs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filteredQs[i], filteredQs[j]] = [filteredQs[j], filteredQs[i]];
  }
}

// ── Start / Restart ──────────────────────────────────────────────────────────
function startPractice() {
  started = true;
  applyFilter();
  if (!filteredQs.length) {
    alert('No questions match the selected filter.');
    return;
  }
  currentIdx = 0; correct = 0; wrong = 0; answered = 0;
  document.getElementById('introCard').style.display = 'none';
  document.getElementById('summaryCard').classList.remove('show');
  buildCards();
  showQuestion(0);
}

function restartPractice() {
  document.getElementById('summaryCard').classList.remove('show');
  document.getElementById('questionArea').innerHTML = '';
  startPractice();
}

// ── Build all question cards (hidden) ────────────────────────────────────────
function buildCards() {
  const area = document.getElementById('questionArea');
  area.innerHTML = '';
  filteredQs.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'qc_' + idx;

    const opts = [
      {key:'A', text: q.option_a},
      {key:'B', text: q.option_b},
      {key:'C', text: q.option_c},
      {key:'D', text: q.option_d},
    ];

    const diffClass = q.difficulty === 'Easy' ? 'diff-Easy'
                    : q.difficulty === 'Hard' ? 'diff-Hard' : 'diff-Medium';

    card.innerHTML = `
      <div class="q-meta">
        <span class="q-num">Q ${idx + 1} of ${filteredQs.length}</span>
        <span class="diff-badge ${diffClass}">${q.difficulty}</span>
      </div>
      <div class="q-text">${escHtml(q.question_text)}</div>
      <div class="options-list" id="opts_${idx}">
        ${opts.map(o => `
          <button class="opt-btn" id="opt_${idx}_${o.key}"
                  onclick="selectOption(${idx},'${o.key}','${escAttr(q.correct_answer)}','${escAttr(q.explanation || '')}')">
            <span class="opt-key">${o.key}</span>
            <span class="opt-text">${escHtml(o.text)}</span>
          </button>
        `).join('')}
      </div>
    `;
    area.appendChild(card);
  });
}

// ── Show a question ──────────────────────────────────────────────────────────
function showQuestion(idx) {
  // Hide all cards, feedback, next
  document.querySelectorAll('.q-card').forEach(c => c.classList.remove('visible'));
  document.getElementById('feedbackPanel').classList.remove('show');
  document.getElementById('nextWrap').classList.remove('show');

  if (idx >= filteredQs.length) { showSummary(); return; }

  const card = document.getElementById('qc_' + idx);
  if (card) card.classList.add('visible');
  updateProgress(idx);
}

// ── Handle option tap ────────────────────────────────────────────────────────
function selectOption(idx, chosen, correctAns, explanation) {
  // Lock all options for this card
  const optList = document.getElementById('opts_' + idx);
  if (!optList) return;
  const buttons = optList.querySelectorAll('.opt-btn');
  if (buttons[0].classList.contains('locked')) return; // already answered

  buttons.forEach(btn => btn.classList.add('locked'));
  answered++;

  const isCorrect = chosen === correctAns;
  if (isCorrect) correct++; else wrong++;

  // Highlight chosen option
  const chosenBtn = document.getElementById(`opt_${idx}_${chosen}`);
  chosenBtn.classList.add(isCorrect ? 'correct-ans' : 'wrong-ans');

  // Always show correct answer
  if (!isCorrect) {
    const correctBtn = document.getElementById(`opt_${idx}_${correctAns}`);
    if (correctBtn) correctBtn.classList.add('correct-ans');
  }

  // Show feedback panel
  const panel = document.getElementById('feedbackPanel');
  const label = document.getElementById('fbLabel');
  const expEl = document.getElementById('fbExplanation');

  panel.className = 'feedback-panel show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
  label.textContent = isCorrect ? '✅ Correct!' : '❌ Incorrect!';
  expEl.textContent = explanation || (isCorrect ? 'Well done!' : 'Review the correct answer above.');

  // Show Next button
  const nextWrap = document.getElementById('nextWrap');
  nextWrap.classList.add('show');
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = (idx + 1 >= filteredQs.length) ? 'See Results 🏆' : 'Next Question →';

  updateScore();
  // Scroll feedback into view
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function nextQuestion() {
  currentIdx++;
  showQuestion(currentIdx);
  window.scrollTo({top: 0, behavior:'smooth'});
}

// ── Score / Progress ─────────────────────────────────────────────────────────
function updateScore() {
  document.getElementById('scoreChip').textContent = `${correct} / ${answered}`;
}

function updateProgress(idx) {
  const pct = filteredQs.length > 0 ? (idx / filteredQs.length) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  updateScore();
}

// ── Summary ──────────────────────────────────────────────────────────────────
function showSummary() {
  document.querySelectorAll('.q-card').forEach(c => c.classList.remove('visible'));
  document.getElementById('feedbackPanel').classList.remove('show');
  document.getElementById('nextWrap').classList.remove('show');

  const total = filteredQs.length;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  const icon = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : pct >= 40 ? '📚' : '💪';

  document.getElementById('summaryIcon').textContent  = icon;
  document.getElementById('summaryScore').textContent = pct + '%';
  document.getElementById('summarySub').textContent   = `${correct} correct out of ${total}`;
  document.getElementById('sumCorrect').textContent   = correct;
  document.getElementById('sumWrong').textContent     = wrong;
  document.getElementById('sumTotal').textContent     = total;
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('scoreChip').textContent = `${correct} / ${total}`;

  document.getElementById('summaryCard').classList.add('show');
  window.scrollTo({top: 0, behavior:'smooth'});
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function escHtml(t) {
  if (!t) return '';
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(t) {
  if (!t) return '';
  return String(t).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,' ');
}

load();
</script>
</body>
</html>
